<div class="login-container">
  <img src="../../assets/Logo-BPM-Color.png" alt="Logo" class="login-logo" style="max-width:300px; width:200%; height:auto;" />
  <!-- ngSubmit ejecuta la función en tu archivo .ts al dar clic en ingresar -->
  <form (ngSubmit)="onLogin()" class="login-form">

    <label for="Email">Usuario</label>
    <!-- [(ngModel)] conecta el input con una variable en tu .ts -->
    <input [(ngModel)]="email" name="email" class="login-input" placeholder="usuario@bpm.com" autocomplete="username" />

    <label for="Password">Contraseña</label>
    <input [(ngModel)]="password" name="password" type="password" class="login-input" placeholder="••••••••" autocomplete="current-password" />

    <div class="login-options">
      <label><input [(ngModel)]="rememberMe" name="rememberMe" type="checkbox" /> Recordarme</label>
      <a href="#" class="forgot-link">¿Olvidó clave?</a>
    </div>

    <button type="submit" class="login-btn">INGRESAR</button>
  </form>
</div>

<!-- Tus estilos los dejamos aquí por ahora para que funcione rápido -->
<style>

  .login-input {
