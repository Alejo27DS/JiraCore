<div class="login-container">
  <!-- Logo (Conserva tu ruta) -->
  <img src="../../assets/Logo-BPM-Color.png" alt="Logo" class="login-logo">

  <h2>BPM Consulting</h2>

  <!-- AQUÍ ESTÁ EL CAMBIO: formGroup para conectar con mi código TS -->
  <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
    
    <label>Email</label>
    <!-- CAMBIO: formControlName en lugar de [(ngModel)] -->
    <input type="email" class="login-input" placeholder="usuario@bpm.com" formControlName="email" autocomplete="username" />

    <label>Contraseña</label>
    <input type="password" class="login-input" placeholder="••••••••" formControlName="password" autocomplete="current-password" />

    <div class="login-options">
      <label>
        <!-- Agregado soporte para el checkbox si lo usas en el futuro -->
        <input type="checkbox"> Recordarme
      </label>
      <a href="#" class="forgot-link">¿Olvidó clave?</a>
    </div>

    <button type="submit" [disabled]="loginForm.invalid" class="login-btn">INGRESAR</button>
  </form>
  
  <!-- Mensaje de error -->
  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>
</div>
