<div class="admin-container">
  <h2>Panel de Aprobaciones (Admin)</h2>

  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Tipo de Solicitud</th>
          <th>Fecha</th>
          <th>Empleado</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let sol of solicitudes">
          <td>{{ sol.id }}</td>
          <td><strong>{{ sol.tipo }}</strong></td>
          <td>{{ sol.fecha | date:'short' }}</td>
          <td>{{ sol.nombreEmpleado }}</td>
          <td>
            <span class="badge badge-pending">{{ sol.estado }}</span>
          </td>
          <td>
            <button class="btn btn-success" (click)="aprobar(sol.id)">Aprobar</button>
            <button class="btn btn-danger" (click)="rechazar(sol.id)">Rechazar</button>
          </td>
        </tr>
        <tr *ngIf="solicitudes.length === 0">
          <td colspan="6" style="text-align:center;">No hay solicitudes pendientes.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
