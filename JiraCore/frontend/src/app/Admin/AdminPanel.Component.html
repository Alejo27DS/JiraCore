<div class="wireframe-container">
  <h2>Panel de Aprobaciones (Admin/RRHH)</h2>

  <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
    <thead>
      <tr style="background: #333; color: white; text-align: left;">
        <th style="padding: 10px;">ID</th>
        <th style="padding: 10px;">Tipo</th>
        <th style="padding: 10px;">Datos (JSON)</th>
        <th style="padding: 10px;">Fecha</th>
        <th style="padding: 10px;">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let sol of solicitudes" style="border-bottom: 1px solid #eee;">
        <td style="padding: 10px;">{{ sol.id }}</td>
        <td style="padding: 10px;">{{ sol.tipo }}</td>
        <td style="padding: 10px; font-size: 12px;">{{ sol.datos }}</td>
        <td style="padding: 10px;">{{ sol.fecha | date:'short' }}</td>
        <td style="padding: 10px;">
          <button (click)="aprobar(sol.id)" style="background: green; color: white; border: none; padding: 5px;">Aprobar</button>
          <button (click)="rechazar(sol.id)" style="background: red; color: white; border: none; padding: 5px;">Rechazar</button>
        </td>
      </tr>
      <tr *ngIf="solicitudes.length === 0">
        <td colspan="5" style="text-align: center; padding: 20px;">No hay solicitudes pendientes.</td>
      </tr>
    </tbody>
  </table>
</div>
