<div class="solicitud-personal-container">
  <h2>Cambio de Campaña</h2>

  <!-- Formulario -->
  <form (ngSubmit)="guardarCambio()" #cambioForm="ngForm" class="solicitud-personal-form">

    <!-- Campos conectados -->
    <label for="cedula">Cédula:</label>
    <input type="text" id="cedula" name="cedula" [(ngModel)]="cambio.cedula" required />

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" [(ngModel)]="cambio.nombre" required />

    <label for="cargo">Cargo:</label>
    <select id="cargo" name="cargo" [(ngModel)]="cambio.cargo" required>
      <option value="" disabled selected>Seleccione un cargo</option>
      <option>ACCOUNT EXECUTIVE</option>
      <option>Administrador Operativo de Infraestructura</option>
      <option>AGENTE</option>
      <option>AGENTE BACKUP</option>
      <option>AGENTE BACKUP PROFESIONAL</option>
      <option>AGENTE BILINGÜE</option>
      <option>AGENTE GENERAL</option>
      <option>AGENTE GENERAL LENGUA DE SEÑAS</option>
      <option>AGENTE PROFESIONAL</option>
      <option>Agente Profesional Lengua de señas</option>
      <option>AGENTE PROFESIONAL MINERO DE DATOS</option>
      <option>AGENTE PROFESIONAL_PSICOSOCIAL</option>
      <option>AGENTE TECNICO</option>
      <option>AGENTE TECNICO LENGUA DE SEÑAS</option>
      <option>Agente_tecnico_para_direccion_de_riesgos_laborales</option>
      <option>ANALISTA CONTABLE</option>
      <option>ANALISTA DE CALIDAD Y PROCESOS</option>
      <option>ANALISTA DE TALENTO HUMANO</option>
      <option>ANALISTA SOPORTE 1</option>
      <option>APRENDIZ LECTIVA</option>
      <option>APRENDIZ PRODUCTIVA</option>
      <option>APRENDIZ UNIVERSITARIO</option>
      <option>Arquitecto de infraestructura en telecomunicaciones</option>
      <option>AUXILIAR DE MANTENIMIENTO Y MENSAJERIA</option>
      <option>AUXILIAR DE SERVICIOS GENERALES</option>
      <option>Bilingual training</option>
      <option>COORDINADOR</option>
      <option>Coordinador de Mesa de Servicio y Soporte TI</option>
      <option>COORDINADOR NACIONAL</option>
      <option>DESARROLLADOR JUNIOR</option>
      <option>Director de Desarrollo de Software</option>
      <option>FORMADOR</option>
      <option>GERENTE ADMINISTRATIVO Y FINANCIERO</option>
      <option>GERENTE DE CONTROL MEJORA E INNOVACION</option>
      <option>GERENTE DE INFRAESTRUCTURA Y TECNOLOGIA</option>
      <option>GERENTE DE MERCADEO Y VENTAS</option>
      <option>GERENTE DE OPERACIONES</option>
      <option>GERENTE DE PROYECTO</option>
      <option>GERENTE DE TALENTO HUMANO Y CULTURA</option>
      <option>GERENTE GENERAL</option>
      <option>Ingeniero de Soluciones de Inteligencia Artificial</option>
      <option>Level 1 Support Analyst</option>
      <option>LIDER ADMINISTRATIVO Y FINANCIERO</option>
      <option>LIDER DE ATRACCION Y SELECCIÓN DEL TALENTO</option>
      <option>LIDER DE CALIDAD</option>
      <option>LIDER DE FORMACION Y BIENESTAR</option>
      <option>LIDER DE NOMINA Y NOVEDADES DE TALENTO HUMANO</option>
      <option>LIDER DE SALUD Y SEGURIDAD EN EL TRABAJO</option>
      <option>LIDER MARKETING DIGITAL</option>
      <option>MINERO DE DATOS</option>
      <option>PROFESIONAL DE TALENTO HUMANO BILINGUE</option>
      <option>PROFESIONAL ZONAL EN CAMPO</option>
      <option>RECEPCIONISTA</option>
      <option>Sales Representative</option>
      <option>SUBGERENTE GENERAL</option>
      <option>SUPERVISOR</option>
      <option>SUPERVISOR DE OPERACIONES FEEL / ELP</option>
      <option>TEAM LEADER</option>
      <option>TEAM LEADER JUNIOR</option>
    </select>

    <label for="campana-area">Campaña o Áreas a cambiar:</label>
    <select id="campana-area" name="campana-area" [(ngModel)]="cambio.campanaArea">
      <option value="" disabled selected>Seleccione una opción...</option>
      <option value="Anla">Anla</option>
      <option value="Ant">Ant</option>
      <option value="ARN">ARN</option>
      <option value="Banco de La Republica">Banco de La Republica</option>
      <option value="Dissan Ibagué">Dissan Ibagué</option>
      <option value="Dissan Risaralda">Dissan Risaralda</option>
      <option value="Fedex">Fedex</option>
      <option value="Feel">Feel</option>
      <option value="Gerencia Control y Mejora">Gerencia Control y Mejora</option>
      <option value="Gerencia General">Gerencia General</option>
      <option>GERENTE DE TALENTO HUMANO Y CULTURA</option>
      <option>MINERIO DE DATOS</option>
      <option>RECEPCIONISTA</option>
    </select>

    <label for="ultimoDiaLaborado">Último día laborado en la actual campaña:</label>
    <input type="date" id="ultimoDiaLaborado" name="ultimoDiaLaborado" [(ngModel)]="cambio.ultimoDiaLaborado" required />

    <label for="documento">Adjuntar el paz y salvo debidamente firmado:</label>
    <input type="file" id="documento" (change)="onFileSelected($event)" accept=".pdf,.doc,.docx,.jpg,.png" required />

    <label for="correoElectronicoSupervisor">Correo electrónico del nuevo supervisor:</label>
    <input type="text" id="correoElectronicoSupervisor" name="correoElectronicoSupervisor" [(ngModel)]="cambio.correoElectronicoSupervisor" required />

    <div style="margin-top: 20px; display: flex; gap: 10px;">
      <!-- Botón GUARDAR: type="submit" -->
      <button type="submit" class="btn btn-primary" [disabled]="cambioForm.invalid">Guardar</button>

      <!-- Botón CANCELAR: type="button" y sin disabled -->
      <button type="button" (click)="cancelar()" class="btn btn-warning">Cancelar</button>
    </div>
  </form>
</div>
