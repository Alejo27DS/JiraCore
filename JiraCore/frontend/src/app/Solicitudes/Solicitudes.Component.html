<div class="ajuste-nomina-container">
  <h2>Solicitud de Ingreso</h2>

  <!-- (ngSubmit) maneja el envío, #solicitudForm valida -->
  <form (ngSubmit)="guardarSolicitud()" #solicitudForm="ngForm" class="solicitud-personal-form">

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" [(ngModel)]="solicitud.nombre" required />

    <label for="cedula">Cédula:</label>
    <input type="text" id="cedula" name="cedula" [(ngModel)]="solicitud.cedula" required />

    <label for="resumen">Resumen:</label>
    <input type="text" id="resumen" name="resumen" [(ngModel)]="solicitud.resumen" required />

    <label for="fechaInforme">Fecha de informe:</label>
    <input type="date" id="fechaInforme" name="fechaInforme" [(ngModel)]="solicitud.fechaInforme" required />

    <label for="cargo">Cargo:</label>
    <select id="cargo" name="cargo" [(ngModel)]="solicitud.cargo" required>
      <option>ACCOUNT EXECUTIVE</option>
      <option>Administrador Operativo de Infraestructura</option>
      <option>AGENTE</option>
      <option>AGENTE BACKUP</option>
      <option>AGENTE BACKUP PROFESIONAL</option>
      <option>AGENTE BILINGÜE</option>
      <option>AGENTE GENERAL</option>
      <option>AGENTE GENERAL LENGUA DE SEÑAS</option>
      <option>AGENTE PROFESIONAL</option>
      <option>Agente Profesional Lengua de señas</option>
      <option>AGENTE PROFESIONAL MINERO DE DATOS</option>
      <option>AGENTE PROFESIONAL_PSICOSOCIAL</option>
      <option>AGENTE TECNICO</option>
      <option>AGENTE TECNICO LENGUA DE SEÑAS</option>
      <option>Agente_tecnico_para_direccion_de_riesgos_laborales</option>
      <option>ANALISTA CONTABLE</option>
      <option>ANALISTA DE CALIDAD Y PROCESOS</option>
      <option>ANALISTA DE TALENTO HUMANO</option>
      <option>ANALISTA SOPORTE 1</option>
      <option>APRENDIZ LECTIVA</option>
      <option>APRENDIZ PRODUCTIVA</option>
      <option>APRENDIZ UNIVERSITARIO</option>
      <option>Arquitecto de infraestructura en telecomunicaciones</option>
      <option>AUXILIAR DE MANTENIMIENTO Y MENSAJERIA</option>
      <option>AUXILIAR DE SERVICIOS GENERALES</option>
      <option>Bilingual training</option>
      <option>COORDINADOR</option>
      <option>Coordinador de Mesa de Servicio y Soporte TI</option>
      <option>COORDINADOR NACIONAL</option>
      <option>DESARROLLADOR JUNIOR</option>
      <option>Director de Desarrollo de Software</option>
      <option>FORMADOR</option>
      <option>GERENTE ADMINISTRATIVO Y FINANCIERO</option>
      <option>GERENTE DE CONTROL MEJORA E INNOVACION</option>
      <option>GERENTE DE INFRAESTRUCTURA Y TECNOLOGIA</option>
      <option>GERENTE DE MERCADEO Y VENTAS</option>
      <option>GERENTE DE OPERACIONES</option>
      <option>GERENTE DE PROYECTO</option>
      <option>GERENTE DE TALENTO HUMANO Y CULTURA</option>
      <option>GERENTE GENERAL</option>
      <option>Ingeniero de Soluciones de Inteligencia Artificial</option>
      <option>Level 1 Support Analyst</option>
      <option>LIDER ADMINISTRATIVO Y FINANCIERO</option>
      <option>LIDER DE ATRACCION Y SELECCIÓN DEL TALENTO</option>
      <option>LIDER DE CALIDAD</option>
      <option>LIDER DE FORMACION Y BIENESTAR</option>
      <option>LIDER DE NOMINA Y NOVEDADES DE TALENTO HUMANO</option>
      <option>LIDER DE SALUD Y SEGURIDAD EN EL TRABAJO</option>
      <option>LIDER MARKETING DIGITAL</option>
      <option>MINERO DE DATOS</option>
      <option>PROFESIONAL DE TALENTO HUMANO BILINGUE</option>
      <option>PROFESIONAL ZONAL EN CAMPO</option>
      <option>RECEPCIONISTA</option>
      <option>Sales Representative</option>
      <option>SUBGERENTE GENERAL</option>
      <option>SUPERVISOR</option>
      <option>SUPERVISOR DE OPERACIONES FEEL / ELP</option>
      <option>TEAM LEADER</option>
      <option>TEAM LEADER JUNIOR</option>
    </select>

    <label for="campanaArea">Campaña o Áreas:</label>
    <select id="campanaArea" name="campanaArea" [(ngModel)]="solicitud.campanaArea">
      <option value="" disabled selected>Seleccione una opción...</option>
      <option value="Anla">Anla</option>
      <option value="Ant">Ant</option>
      <option value="ARN">ARN</option>
      <option value="Banco de La Republica">Banco de La Republica</option>
      <option value="Dissan Ibagué">Dissan Ibagué</option>
      <option value="Dissan Risaralda">Dissan Risaralda</option>
      <option value="Fedex">Fedex</option>
      <option value="Feel">Feel</option>
      <option value="Gerencia Control y Mejora">Gerencia Control y Mejora</option>
      <option value="Gerencia Financiera y Administrativa">Gerencia Financiera y Administrativa</option>
      <option value="Gerencia General">Gerencia General</option>
      <option value="Gerencia Operaciones">Gerencia Operaciones</option>
      <option value="Gerencia Recursos Humanos">Gerencia Recursos Humanos</option>
      <option value="Gerencia Tecnologia">Gerencia Tecnologia</option>
      <option value="Minigualdad">Minigualdad</option>
      <option value="Ministerio del interior">Ministerio del interior</option>
      <option value="Movilidad">Movilidad</option>
      <option value="Opain">Opain</option>
      <option value="Preppas">Preppas</option>
      <option value="Rubicón">Rubicón</option>
      <option value="Sanida Costa">Sanida Costa</option>
      <option value="SIC">SIC</option>
      <option value="Supersociedades empresarial">Supersociedades empresarial</option>
      <option value="Uariv">Uariv</option>
      <option value="Universidad Militar">Universidad Militar</option>
    </select>

    <label for="modalidadTrabajo">Modalidad de Trabajo:</label>
    <select id="modalidadTrabajo" name="modalidadTrabajo" [(ngModel)]="solicitud.modalidadTrabajo">
      <option value="" disabled selected>Seleccione una opción...</option>
      <option value="Presencial Toberín">Presencial Toberín</option>
      <option value="Presencial Zona Franca">Presencial Zona Franca</option>
      <option value="Trabajo en casa">Trabajo en casa</option>
      <option value="Alternancia">Alternancia</option>
      <option value="Presencial Cliente">Presencial Cliente</option>
    </select>

    <label for="ciudadTrabajo">Ciudad de Trabajo:</label>
    <select id="ciudadTrabajo" name="ciudadTrabajo" [(ngModel)]="solicitud.ciudadTrabajo">
      <option value="">Seleccione...</option>
      <option value="Bogota">bogota</option>

    </select>

    <label for="horarioLaboral">Horario Laboral:</label>
    <select id="horarioLaboral" name="horarioLaboral" [(ngModel)]="solicitud.horarioLaboral">
      <option value="">Seleccione...</option>
      <option value="oficina-8-5">Horario Oficina (08:00 AM - 05:00 PM)</option>
      <option value="continuo-7-4">Horario Continuo (07:00 AM - 04:00 PM)</option>
      <option value="continuo-8-5">Horario Continuo (08:00 AM - 05:00 PM)</option>
      <option value="comercial-9-6">Horario Comercial (09:00 AM - 06:00 PM)</option>
      <option value="corrido-6-3">Horario Corrido (06:00 AM - 03:00 PM)</option>
    </select>

    <label for="tipoContrato">Tipo de Contrato:</label>
    <select id="tipoContrato" name="tipoContrato" [(ngModel)]="solicitud.tipoContrato">
      <option value="">Seleccione...</option>
      <option value="termino fijo">termino fijo</option>
      <option value="termino indefinido">termino indefinido</option>
      <option value="obra labor">obra labor </option>
      <option value="contrato de aprendizaje">contrato de aprendizaje </option>
    </select>


    <label for="jefeInmediato">Jefe Inmediato:</label>
    <input type="text" id="jefeInmediato" name="jefeInmediato" [(ngModel)]="solicitud.jefeInmediato" required />

    <label for="fechaInicio">Fecha Inicio de contrato:</label>
    <input type="date" id="fechaInicio" name="fechaInicio" [(ngModel)]="solicitud.fechaInicio" required />

    <label for="fechaRetiro">Fecha Fin de contrato:</label>
    <input type="date" id="fechaRetiro" name="fechaRetiro" [(ngModel)]="solicitud.fechaRetiro" required />

    <label for="justificacionSolicitud">Justificacion de Solicitud:</label>
    <input type="text" id="justificacionSolicitud" name="justificacionSolicitud" [(ngModel)]="solicitud.justificacionSolicitud" required />

    <label for="descripcion">Descripción:</label>
    <input type="text" id="descripcion" name="descripcion" [(ngModel)]="solicitud.descripcion" required />

    <div style="margin-top: 20px; display: flex; gap: 10px;">
      <!-- Botón GUARDAR -->
      <button type="submit" class="btn btn-primary" [disabled]="solicitudForm.invalid">Guardar</button>

      <!-- Botón CANCELAR -->
      <button type="button" (click)="cancelar()" class="btn btn-warning">Cancelar</button>
    </div>

  </form>
</div>
