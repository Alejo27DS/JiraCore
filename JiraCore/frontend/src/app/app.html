<div class="wireframe-container" style="display: flex !important; flex-direction: row !important; flex-wrap: nowrap !important; width: 100% !important; height: 100vh !important; min-width: 1000px !important; background: white;">

  <!-- SIDEBAR: SOLO se muestra si isLoggedIn es TRUE -->
  <div class="sidebar" *ngIf="isLoggedIn">
    <div class="sidebar-header">BPM SYSTEM</div>

    <a routerLink="admin-panel" *ngIf="isAdmin" class="menu-item" style="background: #333; color: yellow; font-weight: bold;">
      📋 Aprobaciones Pendientes (Admin)
    </a>

    <a routerLink="dashboard" routerLinkActive="active" class="menu-item">Dashboard</a>
    <a routerLink="nomina" routerLinkActive="active" class="menu-item">Nomina</a>
    <a routerLink="solicitudes" routerLinkActive="active" class="menu-item">Solicitudes</a>
    <a routerLink="retiro" routerLinkActive="active" class="menu-item">Retiro</a>
    <a routerLink="cambiocampaña" routerLinkActive="active" class="menu-item">Cambio de Campaña</a>
    <a routerLink="sst" routerLinkActive="active" class="menu-item">Citas SST</a>
    <a routerLink="seguridad" routerLinkActive="active" class="menu-item">Seguridad y Salud</a>

    <div style="margin-top: auto; padding: 20px;">
      <a (click)="logout()" class="btn" style="width:100%; text-align:center; display:block;">Cerrar Sesión</a>
    </div>
  </div>

  <!-- MAIN CONTENT: SIEMPRE VISIBLE (Sin *ngIf) -->
  <div class="main-content">

    <!-- TOP BAR: SOLO se muestra si isLoggedIn es TRUE -->
    <div class="top-bar" *ngIf="isLoggedIn">
      <h3>Bienvenido</h3>
      <a routerLink="notificaciones" routerLinkActive="active" class="menu-item">Alertas</a>
      <div style="font-size: 12px;">Usuario: Admin</div>
    </div>

    <!-- ROUTER OUTLET: SIEMPRE VISIBLE. Aquí carga el Login o el Dashboard -->
    <router-outlet></router-outlet>

  </div>

</div>
